<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>账号额度统计</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6f8;
      --panel: #ffffff;
      --panel-soft: #f7fafc;
      --panel-strong: #0f172a;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe4ea;
      --line-strong: #c4d1da;
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.1);
      --good: #15803d;
      --good-soft: rgba(21, 128, 61, 0.12);
      --warn: #b45309;
      --warn-soft: rgba(180, 83, 9, 0.12);
      --bad: #b91c1c;
      --bad-soft: rgba(185, 28, 28, 0.12);
      --info: #2563eb;
      --info-soft: rgba(37, 99, 235, 0.12);
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #020617;
      --panel: #0f172a;
      --panel-soft: #111c31;
      --panel-strong: #0b1220;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --line: #243247;
      --line-strong: #334155;
      --accent: #2dd4bf;
      --accent-soft: rgba(45, 212, 191, 0.14);
      --good: #4ade80;
      --good-soft: rgba(74, 222, 128, 0.14);
      --warn: #f59e0b;
      --warn-soft: rgba(245, 158, 11, 0.14);
      --bad: #f87171;
      --bad-soft: rgba(248, 113, 113, 0.14);
      --info: #60a5fa;
      --info-soft: rgba(96, 165, 250, 0.14);
      --shadow: 0 1px 3px rgba(2, 6, 23, 0.45), 0 16px 40px rgba(2, 6, 23, 0.4);
    }
    * {
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
      overflow-y: scroll;
      scrollbar-gutter: stable both-edges;
      background: var(--bg);
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .shell {
      max-width: 1520px;
      margin: 0 auto;
      padding: 24px;
    }
    :root[data-embedded="true"] .shell {
      max-width: none;
      padding: 12px;
    }
    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      padding: 22px 24px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .hero::after {
      display: none;
    }
    .hero h1 {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.1;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 840px;
    }
    .hero-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      min-width: 280px;
    }
    .status-line {
      text-align: right;
      color: var(--muted);
      font-size: 13px;
    }
    .btn-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    button,
    input,
    select {
      font: inherit;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 108px;
      height: 42px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    .btn:disabled {
      opacity: 0.64;
      cursor: default;
    }
    .btn-primary {
      background: linear-gradient(135deg, #0f766e, #115e59);
      color: #ffffff;
    }
    .btn-secondary {
      border-color: var(--line);
      background: var(--panel);
    }
    .banner {
      display: none;
      margin-bottom: 16px;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(185, 28, 28, 0.18);
      background: var(--bad-soft);
      color: var(--bad);
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      margin-bottom: 16px;
    }
    .toolbar-panel {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
      min-height: 68px;
    }
    .toolbar-label {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .scope-tabs,
    .view-tabs {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border-radius: 999px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
    }
    .scope-tab,
    .view-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 16px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
    }
    .scope-tab.active,
    .view-tab.active {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .scope-note {
      color: var(--muted);
      font-size: 13px;
    }
    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
    }
    .input,
    .select {
      height: 40px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      outline: none;
    }
    .input {
      width: 240px;
      max-width: 100%;
    }
    .page {
      display: none;
      gap: 16px;
    }
    .page.active {
      display: grid;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }
    .card,
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .card {
      padding: 14px 16px;
      min-height: 122px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, rgba(15, 118, 110, 0.95), rgba(37, 99, 235, 0.75));
    }
    .card .label {
      color: var(--muted);
      font-size: 12px;
    }
    .card .value {
      margin-top: 8px;
      font-size: 28px;
      line-height: 1.05;
      font-weight: 700;
    }
    .card .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .card .mini-bar {
      width: 100%;
      height: 8px;
      margin-top: 12px;
      border-radius: 999px;
      background: var(--panel-soft);
      overflow: hidden;
    }
    .card .mini-bar > span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--info));
    }
    .grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(300px, 0.9fr);
      gap: 16px;
    }
    .panel {
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 0;
    }
    .panel-heading {
      min-width: 0;
      flex: 1 1 auto;
    }
    .panel-title {
      margin: 0;
      min-height: 28px;
      display: flex;
      align-items: center;
      font-size: 18px;
      line-height: 1.2;
    }
    .panel-toggle {
      width: 100%;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      align-items: start;
      gap: 12px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      text-align: left;
    }
    .panel-toggle:hover {
      color: var(--text);
    }
    .panel-toggle:focus-visible {
      outline: 2px solid rgba(15, 118, 110, 0.28);
      outline-offset: 4px;
      border-radius: 12px;
    }
    .panel-toggle-text {
      display: grid;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .panel-toggle-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      align-self: start;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      transition: transform 0.16s ease;
    }
    .panel-toggle:hover .panel-title {
      color: var(--accent);
    }
    .panel-toggle:hover .panel-toggle-icon,
    .panel-toggle:focus-visible .panel-toggle-icon,
    .panel-toggle:active .panel-toggle-icon {
      border-color: var(--line);
      background: transparent;
      color: var(--muted);
    }
    .panel-head .caption {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    .panel-body {
      padding: 16px 18px 18px;
    }
    .panel.collapsed .panel-body {
      display: none;
    }
    .panel.collapsed .panel-head {
      padding-bottom: 16px;
    }
    .panel.collapsed .panel-head .caption {
      display: none;
    }
    .panel.collapsed .panel-toggle-icon {
      transform: rotate(-90deg);
    }
    .panel-stack {
      display: grid;
      gap: 14px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .pill-good {
      background: var(--good-soft);
      color: var(--good);
    }
    .pill-warn {
      background: var(--warn-soft);
      color: var(--warn);
    }
    .pill-bad {
      background: var(--bad-soft);
      color: var(--bad);
    }
    .pill-info {
      background: var(--info-soft);
      color: var(--info);
    }
    .pill-neutral {
      background: var(--panel-soft);
      color: var(--muted);
    }
    .plan-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .plan-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel-soft);
    }
    .plan-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    .plan-name {
      font-size: 17px;
      font-weight: 700;
    }
    .plan-count {
      color: var(--muted);
      font-size: 12px;
    }
    .bucket-stack {
      display: grid;
      gap: 10px;
    }
    .bucket {
      padding: 12px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
    }
    .bucket-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .bucket-title {
      font-weight: 700;
    }
    .bucket-total {
      font-size: 24px;
      font-weight: 700;
    }
    .bucket-meta {
      color: var(--muted);
      font-size: 12px;
    }
    .meter {
      display: grid;
      gap: 6px;
    }
    .meter-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--panel-soft);
      overflow: hidden;
    }
    .meter-fill {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #c2410c, #d97706 44%, #15803d 100%);
    }
    .meter-fill.good {
      background: linear-gradient(90deg, #65a30d, #22c55e);
    }
    .meter-fill.warn {
      background: linear-gradient(90deg, #f59e0b, #d97706);
    }
    .meter-fill.bad {
      background: linear-gradient(90deg, #dc2626, #ef4444);
    }
    .state-grid,
    .history-grid {
      display: grid;
      gap: 10px;
    }
    .state-row,
    .history-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .state-row .count,
    .history-row .count {
      font-size: 22px;
      font-weight: 700;
    }
    .state-row .name,
    .history-row .name {
      font-weight: 700;
    }
    .state-row .hint,
    .history-row .hint {
      color: var(--muted);
      font-size: 12px;
    }
    .history-row {
      grid-template-columns: 146px minmax(0, 1fr) 110px;
    }
    .table-wrap {
      overflow: auto;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel);
    }
    .pager-slot,
    .lane-pager {
      display: flex;
      justify-content: flex-end;
    }
    .pager {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pager-info {
      color: var(--muted);
      font-size: 12px;
    }
    .pager-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-left: auto;
    }
    .pager-btn,
    .pager-dots {
      height: 34px;
      min-width: 34px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }
    .pager-btn {
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
    }
    .pager-btn:hover:not(:disabled) {
      border-color: var(--line-strong);
      background: var(--panel-soft);
    }
    .pager-btn.active {
      border-color: rgba(15, 118, 110, 0.32);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }
    .pager-btn:disabled {
      opacity: 0.52;
      cursor: default;
    }
    .pager-dots {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      cursor: default;
    }
    .pager-size-select {
      width: 88px;
      height: 34px;
      padding: 0 10px;
      margin: 0 6px;
      border-radius: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }
    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--panel);
      font-size: 12px;
      color: var(--muted);
    }
    tbody tr:hover {
      background: var(--accent-soft);
    }
    .mono {
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
    }
    .sort-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
    }
    .sort-btn.active {
      color: var(--accent);
    }
    .sort-indicator {
      font-size: 11px;
    }
    .account-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .account-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      min-width: 0;
      overflow: hidden;
      cursor: pointer;
      text-align: left;
      color: inherit;
      box-shadow: var(--shadow);
    }
    .account-card.active {
      border-color: rgba(15, 118, 110, 0.42);
      box-shadow: 0 0 0 1px rgba(15, 118, 110, 0.18), var(--shadow);
    }
    .account-card.failed {
      border-color: rgba(185, 28, 28, 0.22);
    }
    .account-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .account-top-main {
      min-width: 0;
      flex: 1 1 auto;
    }
    .account-name {
      font-size: 15px;
      font-weight: 700;
      word-break: break-all;
    }
    .account-sub {
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }
    .bucket-pair {
      display: grid;
      gap: 10px;
    }
    .bucket-chip {
      display: grid;
      gap: 5px;
    }
    .bucket-chip-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
    }
    .bucket-chip-top > span {
      min-width: 0;
    }
    .bucket-chip-top > strong {
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .bucket-chip-track {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: var(--panel-soft);
      overflow: hidden;
    }
    .bucket-chip-track > span {
      display: block;
      height: 100%;
      border-radius: 999px;
    }
    .account-meta-line {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .account-meta-text {
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
      word-break: break-word;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-clamp: 2;
    }
    .account-meta-time {
      flex: 0 0 auto;
      white-space: nowrap;
      text-align: right;
    }
    .lane-wrap {
      display: grid;
      gap: 12px;
    }
    .lane {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .lane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      background: var(--panel-soft);
      border-bottom: 1px solid var(--line);
    }
    .lane-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
      padding: 14px;
    }
    .lane-pager {
      padding: 0 14px 14px;
    }
    .side {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(480px, 100vw);
      transform: translateX(100%);
      transition: transform 0.18s ease;
      z-index: 30;
      background: var(--panel);
      border-left: 1px solid var(--line);
      box-shadow: -16px 0 36px rgba(15, 23, 42, 0.16);
    }
    .side.open {
      transform: translateX(0);
    }
    .side-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.36);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 29;
    }
    .side-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    .side-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
    }
    .side-head h2 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.2;
      word-break: break-all;
    }
    .side-body {
      height: calc(100% - 88px);
      overflow: auto;
      padding: 16px 18px 20px;
      display: grid;
      gap: 14px;
    }
    .detail-block {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-soft);
    }
    .detail-block h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .detail-item {
      display: grid;
      gap: 4px;
    }
    .detail-key {
      color: var(--muted);
      font-size: 12px;
    }
    .detail-value {
      word-break: break-all;
      font-weight: 600;
    }
    .empty {
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }
    .hidden {
      display: none !important;
    }
    @media (max-width: 1280px) {
      .cards {

    }
  </style>
</head>

  <script>
  (function () {
    "use strict";

    var COLLAPSE_STORAGE_KEY = "quota-dashboard-collapse-state-v1";
    var PAGE_DEFAULT_SIZE = {
      recoveryPreview: 10,
      historyPreview: 10,
      matrix: 20,
      recoveryLane: 20,
      history: 20
    };
    var PAGE_SIZE_OPTIONS = [10, 20, 50, 100];

    function getParam(name) {
      var query = location.search.slice(1).split("&");
      var i;
      for (i = 0; i < query.length; i += 1) {
        var pair = query[i].split("=");
        if (decodeURIComponent(pair[0] || "") === name) {
          return decodeURIComponent((pair[1] || "").replace(/\+/g, "%20"));
        }
      }
      return "";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function pct(value) {
      if (value === null || value === undefined || value === "") return "-";
      var n = Number(value);
      if (isNaN(n)) return "-";
      return n.toFixed(2) + "%";
    }

    function shortPct(value) {
      if (value === null || value === undefined || value === "") return "-";
      var n = Number(value);
      if (isNaN(n)) return "-";
      return (Math.abs(n - Math.round(n)) < 0.05 ? Math.round(n) : n.toFixed(1)) + "%";
    }

    function numberText(value) {
      if (value === null || value === undefined || value === "") return "-";
      var n = Number(value);
      if (isNaN(n)) return "-";
      return Math.abs(n - Math.round(n)) < 0.05 ? String(Math.round(n)) : n.toFixed(2);
    }

    function dt(value) {
      if (!value) return "-";
      var d = new Date(value);
      if (isNaN(d.getTime())) return String(value);
      return d.toLocaleString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
    }

    function parseTime(value) {
      if (!value) return null;
      var d = new Date(value);
      if (isNaN(d.getTime())) return null;
      return d.getTime();
    }

    function remainingClass(value) {
      if (value === null || value === undefined || value === "") return "bad";
      var n = Number(value);
      if (isNaN(n)) return "bad";
      if (n < 20) return "bad";
      if (n < 50) return "warn";
      return "good";
    }

    function stateLabel(state) {
      switch (state) {
        case "healthy": return "健康";
        case "recovering": return "恢复中";
        case "quota_limited": return "额度限制";
        case "failed": return "失败";
        case "untracked": return "未追踪";
        default: return "未知";
      }
    }

    function statePillClass(state) {
      switch (state) {
        case "healthy": return "pill pill-good";
        case "recovering": return "pill pill-info";
        case "quota_limited": return "pill pill-warn";
        case "failed": return "pill pill-bad";
        default: return "pill pill-neutral";
      }
    }

    function recoverySourceLabel(value) {
      switch (value) {
        case "weekly": return "周额度恢复";
        case "five_hour": return "5h 恢复";
        case "rate_limit": return "限流恢复";
        case "temp_unschedulable": return "临时冻结恢复";
        case "overload": return "过载恢复";
        default: return "未知恢复来源";
      }
    }

    function planLabel(value) {
      var v = String(value || "").toLowerCase();
      if (!v || v === "unknown") return "未识别";
      if (v === "free") return "Free";
      if (v === "plus") return "Plus";
      if (v === "pro") return "Pro";
      if (v === "team") return "Team";
      if (v === "business") return "Business";
      if (v === "enterprise") return "Enterprise";
      return v.charAt(0).toUpperCase() + v.slice(1);
    }

    function authQuery() {
      if (state.secret) return "secret=" + encodeURIComponent(state.secret);
      if (state.adminApiKey) return "admin_api_key=" + encodeURIComponent(state.adminApiKey);
      if (state.xAdminApi) return "x_admin_api=" + encodeURIComponent(state.xAdminApi);
      if (state.token) return "token=" + encodeURIComponent(state.token);
      return "";
    }

    function looksLikeJwt(value) {
      return /^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(String(value || "").trim());
    }

    function tokenFromUnknown(value, depth) {
      var text;
      var preferredKeys;
      var i;
      var key;
      var nested;
      if (depth > 2 || value == null) return "";
      if (typeof value === "string") {
        text = value.trim();
        if (!text) return "";
        if (looksLikeJwt(text)) return text;
        if ((text.charAt(0) === "{" && text.charAt(text.length - 1) === "}") ||
            (text.charAt(0) === "[" && text.charAt(text.length - 1) === "]")) {
          try {
            return tokenFromUnknown(JSON.parse(text), depth + 1);
          } catch (err) {
            return "";
          }
        }
        return "";
      }
      if (typeof value !== "object") return "";

      preferredKeys = ["auth_token", "access_token", "token", "accessToken", "authToken"];
      for (i = 0; i < preferredKeys.length; i += 1) {
        key = preferredKeys[i];
        if (!Object.prototype.hasOwnProperty.call(value, key)) continue;
        nested = tokenFromUnknown(value[key], depth + 1);
        if (nested) return nested;
      }

      for (key in value) {
        if (!Object.prototype.hasOwnProperty.call(value, key)) continue;
        nested = tokenFromUnknown(value[key], depth + 1);
        if (nested) return nested;
      }
      return "";
    }

    function authToken() {
      var localStorageRef;
      var keys;
      var i;
      var key;
      var token;
      try {
        localStorageRef = window.localStorage;
        if (!localStorageRef) return "";

        keys = ["auth_token", "access_token", "token", "accessToken", "authToken"];
        for (i = 0; i < keys.length; i += 1) {
          token = tokenFromUnknown(localStorageRef.getItem(keys[i]), 0);
          if (token) return token;
        }

        for (i = 0; i < localStorageRef.length; i += 1) {
          key = localStorageRef.key(i);
          if (!key) continue;
          token = tokenFromUnknown(localStorageRef.getItem(key), 0);
          if (token) return token;
        }
        return "";
      } catch (err) {
        return "";
      }
    }

    function themeFromDocument(doc) {
      if (!doc) return "";
      var bodyTheme = String(doc.body && doc.body.getAttribute("data-theme") || "").toLowerCase();
      if (bodyTheme === "dark" || bodyTheme === "light") return bodyTheme;
      var rootTheme = String(doc.documentElement && doc.documentElement.getAttribute("data-theme") || "").toLowerCase();
      if (rootTheme === "dark" || rootTheme === "light") return rootTheme;
      var bodyClass = doc.body && doc.body.classList;
      if (bodyClass && bodyClass.contains("dark")) return "dark";
      if (bodyClass && bodyClass.contains("light")) return "light";
      var rootClass = doc.documentElement && doc.documentElement.classList;
      if (rootClass && rootClass.contains("dark")) return "dark";
      if (rootClass && rootClass.contains("light")) return "light";
      return "";
    }

    function parentDocument() {
      try {
        if (!window.parent || window.parent === window) return null;
        return window.parent.document || null;
      } catch (err) {
        return null;
      }
    }

    function detectTheme() {
      var explicit = String(state.theme || "").toLowerCase();
      if (explicit === "dark" || explicit === "light") return explicit;
      var parentTheme = themeFromDocument(parentDocument());
      if (parentTheme) return parentTheme;
      var currentTheme = themeFromDocument(document);
      if (currentTheme) return currentTheme;
      if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) return "dark";
      return "light";
    }

    function applyTheme(theme) {
      if (theme !== "dark" && theme !== "light") return;
      document.documentElement.setAttribute("data-theme", theme);
    }

    function syncTheme() {
      applyTheme(detectTheme());
    }

    function watchParentTheme() {
      var parentDoc = parentDocument();
      if (!parentDoc || !window.MutationObserver) return;
      var observer = new MutationObserver(syncTheme);
      if (parentDoc.documentElement) {
        observer.observe(parentDoc.documentElement, {
          attributes: true,
          attributeFilter: ["class", "data-theme"]
        });
      }
      if (parentDoc.body) {
        observer.observe(parentDoc.body, {
          attributes: true,
          attributeFilter: ["class", "data-theme"]
        });
      }
    }

    function request(url, done) {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", url, true);
      var token = authToken();
      if (token) xhr.setRequestHeader("Authorization", "Bearer " + token);
      xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) return;
        if (xhr.status >= 200 && xhr.status < 300) {
          done(null, xhr.responseText);
          return;
        }
        done(new Error(xhr.responseText || ("HTTP " + xhr.status)));
      };
      xhr.onerror = function () {
        done(new Error("网络请求失败"));
      };
      xhr.send(null);
    }

    function readCollapseState() {
      try {
        if (!window.localStorage) return {};
        var raw = window.localStorage.getItem(COLLAPSE_STORAGE_KEY);
        if (!raw) return {};
        var parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (err) {
        return {};
      }
    }

    function writeCollapseState() {
      try {
        if (!window.localStorage) return;
        window.localStorage.setItem(COLLAPSE_STORAGE_KEY, JSON.stringify(state.collapsedPanels));
      } catch (err) {
        return;
      }
    }

    function setPanelCollapsed(id, collapsed) {
      state.collapsedPanels[id] = !!collapsed;
      writeCollapseState();
      syncCollapsedPanels();
    }

    function syncCollapsedPanels() {
      Array.prototype.slice.call(document.querySelectorAll("[data-collapse-id]")).forEach(function (toggle) {
        var id = toggle.getAttribute("data-collapse-id");
        var collapsed = !!state.collapsedPanels[id];
        var panel = toggle.closest(".panel");
        if (panel) panel.classList.toggle("collapsed", collapsed);
        toggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
      });
    }

    function filteredAccounts() {
      if (!state.payload || !state.payload.accounts) return [];
      var list = state.payload.accounts.slice();
      var q = String(elements.searchInput.value || "").trim().toLowerCase();
      var stateFilter = elements.stateFilter.value;
      var planFilter = elements.planFilter.value;
      var mode = elements.accountMode.value;
      return list.filter(function (row) {
        if (stateFilter !== "all" && row.state_key !== stateFilter) return false;
        if (planFilter !== "all" && String(row.plan_type || "") !== planFilter) return false;
        if (mode === "tracked" && !row.has_quota_data) return false;
        if (mode === "limited" && row.state_key !== "quota_limited" && row.state_key !== "recovering") return false;
        if (mode === "recovering" && row.state_key !== "recovering" && row.state_key !== "quota_limited") return false;
        if (!q) return true;
        var hay = [
          row.id,
          row.name,
          row.plan_type,
          row.state_key,
          row.state_reason,
          row.quota_refresh_error
        ].join(" ").toLowerCase();
        return hay.indexOf(q) >= 0;
      });
    }

    function recoveryTimeValue(row) {
      return parseTime(row.earliest_recovery_at) ||
        parseTime(row.weekly_recovery_at) ||
        parseTime(row.weekly_next_reset_at) ||
        parseTime(row.five_hour_recovery_at) ||
        parseTime(row.five_hour_next_reset_at) ||
        parseTime(row.rate_limit_reset_at) ||
        parseTime(row.temp_unschedulable_until) ||
        parseTime(row.overload_until);
    }

    function recoveryCandidates(list) {
      return list.filter(function (row) {
        return row.state_key === "recovering" || row.state_key === "quota_limited";
      });
    }

    function sortAccounts(list) {
      list.sort(function (left, right) {
        var stateRank = {
          failed: 0,
          recovering: 1,
          quota_limited: 2,
          healthy: 3,
          untracked: 4
        };
        var leftRank = stateRank[left.state_key] == null ? 9 : stateRank[left.state_key];
        var rightRank = stateRank[right.state_key] == null ? 9 : stateRank[right.state_key];
        if (leftRank !== rightRank) return leftRank - rightRank;
        var leftPct = left.weekly_remaining_percent == null ? 999 : Number(left.weekly_remaining_percent);
        var rightPct = right.weekly_remaining_percent == null ? 999 : Number(right.weekly_remaining_percent);
        if (leftPct !== rightPct) return leftPct - rightPct;
        var leftReset = parseTime(left.earliest_recovery_at) || parseTime(left.weekly_next_reset_at) || parseTime(left.five_hour_next_reset_at) || Number.MAX_SAFE_INTEGER;
        var rightReset = parseTime(right.earliest_recovery_at) || parseTime(right.weekly_next_reset_at) || parseTime(right.five_hour_next_reset_at) || Number.MAX_SAFE_INTEGER;
        if (leftReset !== rightReset) return leftReset - rightReset;
        return String(left.name || "").localeCompare(String(right.name || ""), "zh-CN");
      });
    }

    function sortRecoveryRows(list) {
      list.sort(function (left, right) {
        var leftReset = recoveryTimeValue(left) || Number.MAX_SAFE_INTEGER;
        var rightReset = recoveryTimeValue(right) || Number.MAX_SAFE_INTEGER;
        if (leftReset !== rightReset) return leftReset - rightReset;
        var leftState = left.state_key === "recovering" ? 0 : (left.state_key === "quota_limited" ? 1 : 2);
        var rightState = right.state_key === "recovering" ? 0 : (right.state_key === "quota_limited" ? 1 : 2);
        if (leftState !== rightState) return leftState - rightState;
        var leftPct = left.weekly_remaining_percent == null ? 999 : Number(left.weekly_remaining_percent);
        var rightPct = right.weekly_remaining_percent == null ? 999 : Number(right.weekly_remaining_percent);
        if (leftPct !== rightPct) return leftPct - rightPct;
        return String(left.name || "").localeCompare(String(right.name || ""), "zh-CN");
      });
    }

    function laneKeyFor(row) {
      var ts = recoveryTimeValue(row);
      if (!ts) return "unknown";
      var diffHours = (ts - Date.now()) / 3600000;
      if (diffHours <= 6) return "immediate";
      if (diffHours <= 24) return "today";
      if (diffHours <= 72) return "soon";
      return "later";
    }

    function laneLabel(key) {
      switch (key) {
        case "immediate": return "即将恢复";
        case "today": return "今日恢复";

        case "later": return "更晚恢复";

    function pageSizeFor(pagerId, fallback) {
      var size = Number(state.pageSizes[pagerId] || fallback);
      if (!isFinite(size) || PAGE_SIZE_OPTIONS.indexOf(size) === -1) return fallback;
      return size;
    }

    function pageSizeSelectHtml(pagerId, currentSize) {
      return '' +
        '<label class="pager-info">每页 ' +
          '<select class="select pager-size-select" data-page-size-id="' + escapeHtml(pagerId) + '">' +
            PAGE_SIZE_OPTIONS.map(function (size) {
              return '<option value="' + escapeHtml(String(size)) + '"' + (size === currentSize ? ' selected' : '') + '>' + escapeHtml(String(size)) + '</option>';
            }).join("") +
          '</select>' +
        ' 条</label>';
    }

    function paginate(list, pagerId, fallbackSize) {
      var total = list.length;
      var size = pageSizeFor(pagerId, fallbackSize);
      var totalPages = Math.max(1, Math.ceil(total / size));
      var page = Number(state.pages[pagerId] || 1);
      if (!isFinite(page) || page < 1) page = 1;
      if (page > totalPages) page = totalPages;
      state.pages[pagerId] = page;
      var startIndex = (page - 1) * size;
      return {
        total: total,
        totalPages: totalPages,
        page: page,
        size: size,
        start: total ? (startIndex + 1) : 0,
        end: Math.min(total, startIndex + size),
        items: list.slice(startIndex, startIndex + size)
      };
    }

    function pageSeries(current, totalPages) {
      var pages = [];
      var i;
      if (totalPages <= 7) {
        for (i = 1; i <= totalPages; i += 1) pages.push(i);
        return pages;
      }
      pages.push(1);
      if (current > 3) pages.push("dots-left");
      for (i = Math.max(2, current - 1); i <= Math.min(totalPages - 1, current + 1); i += 1) {
        pages.push(i);
      }
      if (current < totalPages - 2) pages.push("dots-right");
      pages.push(totalPages);
      return pages;
    }

    function pagerButton(pagerId, page, label, disabled, active) {
      return '<button class="pager-btn' + (active ? ' active' : '') + '" type="button" data-pager-id="' + escapeHtml(pagerId) + '" data-page-number="' + escapeHtml(String(page)) + '"' + (disabled ? ' disabled' : '') + '>' + escapeHtml(label) + '</button>';
    }

    function pagerHtml(pagerId, meta, noun) {
      if (!meta.total) return "";
      var items = [];
      if (meta.totalPages > 1) {
        items.push(pagerButton(pagerId, meta.page - 1, "上一页", meta.page <= 1, false));
        pageSeries(meta.page, meta.totalPages).forEach(function (entry) {
          if (typeof entry === "number") {
            items.push(pagerButton(pagerId, entry, String(entry), false, entry === meta.page));
            return;
          }
          items.push('<span class="pager-dots">...</span>');
        });
        items.push(pagerButton(pagerId, meta.page + 1, "下一页", meta.page >= meta.totalPages, false));
      }
      return '' +
        '<div class="pager">' +
          '<div class="pager-info">显示 ' + escapeHtml(String(meta.start)) + '-' + escapeHtml(String(meta.end)) + ' / ' + escapeHtml(String(meta.total)) + escapeHtml(noun) + '</div>' +
          '<div class="pager-controls">' + pageSizeSelectHtml(pagerId, meta.size) + items.join("") + '</div>' +
        '</div>';
    }

            detailItem("周额度剩余", escapeHtml(pct(row.weekly_remaining_percent))) +
            detailItem("5h 剩余", escapeHtml(pct(row.five_hour_remaining_percent))) +
            detailItem("周额度恢复", escapeHtml(dt(row.weekly_recovery_at || row.weekly_next_reset_at))) +
            detailItem("5h 恢复", escapeHtml(dt(row.five_hour_recovery_at || row.five_hour_next_reset_at))) +
            detailItem("周原始剩余", escapeHtml(pct(row.codex_7d_remaining_percent))) +
            detailItem("主额度剩余", escapeHtml(pct(row.codex_primary_remaining_percent))) +
            detailItem("5h 原始剩余", escapeHtml(pct(row.codex_5h_remaining_percent))) +
            detailItem("次级额度剩余", escapeHtml(pct(row.codex_secondary_remaining_percent))) +
          '</div>' +
        '</section>' +
        '<section class="detail-block">' +
          '<h3>时间</h3>' +
          '<div class="detail-grid">' +
            detailItem("额度更新时间", escapeHtml(dt(row.usage_updated_at))) +
            detailItem("刷新落库时间", escapeHtml(dt(row.quota_refreshed_at))) +
            detailItem("最后使用", escapeHtml(dt(row.last_used_at))) +
            detailItem("限流重置", escapeHtml(dt(row.rate_limit_reset_at))) +
            detailItem("临时冻结到", escapeHtml(dt(row.temp_unschedulable_until))) +
            detailItem("过载恢复到", escapeHtml(dt(row.overload_until))) +
          '</div>' +
        '</section>' +
        '<section class="detail-block">' +
          '<h3>错误与原因</h3>' +
          '<div class="detail-grid">' +
            detailItem("刷新错误", escapeHtml(row.quota_refresh_error || "-")) +
            detailItem("临时冻结原因", escapeHtml(row.temp_unschedulable_reason || "-")) +
          '</div>' +
        '</section>';
      elements.detailSide.classList.add("open");
      elements.sideBackdrop.classList.add("open");
      elements.detailSide.setAttribute("aria-hidden", "false");
    }

    function detailItem(key, value) {
      return '' +
        '<div class="detail-item">' +
          '<div class="detail-key">' + key + '</div>' +
          '<div class="detail-value">' + value + '</div>' +
        '</div>';
    }

    function renderAll() {
      if (!state.payload) return;
      populatePlanFilter();
      renderSummaryCards();
      renderPlans();
      renderStateGrid();
      renderHistoryPreview();
      renderHistoryTable();

      var rows = filteredAccounts();
      sortAccounts(rows);
      var recoverableRows = recoveryCandidates(rows);
      sortRecoveryRows(recoverableRows);
      renderMatrix(rows);
      renderRecoveryPreview(recoverableRows);
      renderRecovery(rows);

      if (state.selectedId != null) {
        var found = null;
        rows.some(function (row) {
          if (row.id === state.selectedId) {
            found = row;
            return true;
          }
          return false;
        });
        state.selectedAccount = found || findAccountById(state.selectedId);
      } else {
        state.selectedAccount = null;
      }
      renderDetail();
    }

    function findAccountById(id) {
      if (!state.payload || !state.payload.accounts) return null;
      var i;
      for (i = 0; i < state.payload.accounts.length; i += 1) {
        if (state.payload.accounts[i].id === id) return state.payload.accounts[i];
      }
      return null;
    }

    function applyData(payload) {
      state.pages = {};
      state.payload = payload;
      var summary = payload.summary || {};
      setStatus(
        "当前展示上次已保存结果 · 生成时间 " + dt(payload.generated_at) +
        " · 存活 " + numberText(summary.alive_accounts) +
        " / 总账号 " + numberText(summary.total_accounts) +
        " · 周额度成功 " + numberText(summary.tracked_7d_accounts)
      );
      renderAll();
    }

    function load(path) {
      clearError();
      setLoading(true);
      setStatus(path.indexOf("/refresh") !== -1 ? "正在同步额度数据..." : "正在读取上次结果...");
      var auth = authQuery();
      var token = authToken();
      if (!auth && !token) {
        setLoading(false);
        showError("缺少授权参数或后台登录态，请从后台菜单进入，或使用带 secret / admin_api_key / x_admin_api 的直链访问。");
        return;
      }
      var url = path;
      if (auth) url += "?" + auth;
      request(url, function (err, text) {
        setLoading(false);
        if (err) {
          showError(err.message || String(err));
          return;
        }
        try {
          applyData(JSON.parse(text));
        } catch (e) {
          showError(e && e.message ? e.message : String(e));
        }
      });
    }

    function setView(view) {
      state.activeView = view;
      ["overview", "matrix", "recovery", "history"].forEach(function (key) {
        var page = document.getElementById("page" + key.charAt(0).toUpperCase() + key.slice(1));
        if (page) page.classList.toggle("active", key === view);
      });
      Array.prototype.slice.call(document.querySelectorAll(".view-tab")).forEach(function (button) {
        button.classList.toggle("active", button.getAttribute("data-view") === view);
      });
    }

    function bindAccountCards() {
      document.body.addEventListener("click", function (event) {
        var target = event.target;
        while (target && target !== document.body) {
          if (target.hasAttribute && target.hasAttribute("data-account-id")) {
            var id = Number(target.getAttribute("data-account-id"));
            state.selectedId = id;
            state.selectedAccount = findAccountById(id);
            renderDetail();
            return;
          }
          target = target.parentNode;
        }
      });
    }

    function bindPagers() {
      document.body.addEventListener("click", function (event) {
        var target = event.target;
        while (target && target !== document.body) {
          if (target.hasAttribute && target.hasAttribute("data-pager-id")) {
            var pagerId = target.getAttribute("data-pager-id");
            var nextPage = Number(target.getAttribute("data-page-number"));
            if (!pagerId || !isFinite(nextPage) || nextPage < 1) return;
            state.pages[pagerId] = nextPage;
            renderAll();
            return;
          }
          target = target.parentNode;
        }
      });
      document.body.addEventListener("change", function (event) {
        var target = event.target;
        if (!target || !target.hasAttribute || !target.hasAttribute("data-page-size-id")) return;
        var pagerId = target.getAttribute("data-page-size-id");
        var nextSize = Number(target.value);
        if (!pagerId || PAGE_SIZE_OPTIONS.indexOf(nextSize) === -1) return;
        state.pageSizes[pagerId] = nextSize;
        state.pages[pagerId] = 1;
        renderAll();
      });
    }

    function bindCollapsibles() {
      document.body.addEventListener("click", function (event) {
        var target = event.target;
        while (target && target !== document.body) {
          if (target.hasAttribute && target.hasAttribute("data-collapse-id")) {
            var id = target.getAttribute("data-collapse-id");
            setPanelCollapsed(id, !state.collapsedPanels[id]);
            return;
          }
          target = target.parentNode;
        }
      });
    }

    var state = {
      token: getParam("token"),
      secret: getParam("secret"),
      adminApiKey: getParam("admin_api_key") || getParam("x-api-key"),
      xAdminApi: getParam("x_admin_api") || getParam("x-admin-api") || getParam("admin_api"),
      theme: getParam("theme"),
      embedded: getParam("ui_mode") === "embedded",
      activeView: "overview",
      loading: false,
      collapsedPanels: readCollapseState(),
      pages: {},
      pageSizes: {},
      payload: null,
      selectedId: null,
      selectedAccount: null
    };

    var elements = {
      statusLine: document.getElementById("statusLine"),
      errorBanner: document.getElementById("errorBanner"),
      refresh: document.getElementById("refresh"),
      scopeNote: document.getElementById("scopeNote"),
      searchInput: document.getElementById("searchInput"),
      stateFilter: document.getElementById("stateFilter"),
      planFilter: document.getElementById("planFilter"),
      accountMode: document.getElementById("accountMode"),
      summaryCards: document.getElementById("summaryCards"),
      planOverviewBadge: document.getElementById("planOverviewBadge"),
      planGrid: document.getElementById("planGrid"),
      stateGrid: document.getElementById("stateGrid"),
      recoveryPreview: document.getElementById("recoveryPreview"),
      recoveryPreviewPager: document.getElementById("recoveryPreviewPager"),
      historyPreview: document.getElementById("historyPreview"),
      historyPreviewPager: document.getElementById("historyPreviewPager"),
      matrixCount: document.getElementById("matrixCount"),
      matrixGrid: document.getElementById("matrixGrid"),
      matrixPager: document.getElementById("matrixPager"),
      recoveryCount: document.getElementById("recoveryCount"),
      recoveryLanes: document.getElementById("recoveryLanes"),
      historyCount: document.getElementById("historyCount"),
      historyRows: document.getElementById("historyRows"),
      historyPager: document.getElementById("historyPager"),
      sideBackdrop: document.getElementById("sideBackdrop"),
      detailSide: document.getElementById("detailSide"),
      detailTitle: document.getElementById("detailTitle"),
      detailSubtitle: document.getElementById("detailSubtitle"),
      detailBody: document.getElementById("detailBody")
    };

    syncTheme();
    watchParentTheme();
    if (state.embedded) {
      document.documentElement.setAttribute("data-embedded", "true");
    }

    elements.refresh.addEventListener("click", function () {
      load("api/quotas/refresh");
    });
    elements.sideBackdrop.addEventListener("click", function () {
      state.selectedId = null;
      state.selectedAccount = null;
      renderDetail();
    });
    elements.searchInput.addEventListener("input", function () {
      resetFilteredPages();
      renderAll();
    });
    elements.stateFilter.addEventListener("change", function () {
      resetFilteredPages();
      renderAll();
    });
    elements.planFilter.addEventListener("change", function () {
      resetFilteredPages();
      renderAll();
    });
    elements.accountMode.addEventListener("change", function () {
      resetFilteredPages();
      renderAll();
    });
    Array.prototype.slice.call(document.querySelectorAll(".view-tab")).forEach(function (button) {
      button.addEventListener("click", function () {
        setView(button.getAttribute("data-view"));
      });
    });

    bindAccountCards();
    bindPagers();
    bindCollapsibles();
    syncCollapsedPanels();
    setView("overview");
    load("api/quotas");
    setInterval(function () {
      load("api/quotas");
    }, 3600000);
  })();
  </script>
</body>
</html>
